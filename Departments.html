<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UITS - Departments</title>

    <!-- Reuse existing styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Departments Page Specific Styles */
        :root {
            --light-highlight: rgba(255, 255, 255, 0.03);
        }

        [data-theme="gray"] {
            --light-highlight: rgba(255, 255, 255, 0.85);
            --shadow-color: rgba(0, 0, 0, 0.08);
        }
        body {
            overflow-x: hidden;
            /* Prevent horizontal scroll */
        }

        /* Layout */
        .dept-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1rem 1rem 1rem;
            /* Uniform padding, removed excessive top */
            min-height: 80vh;
            padding-top: 100px;
            /* Keep space for fixed nav */
            box-sizing: border-box;
            width: 100%;
        }

        /* Selection Controls Container */
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            max-width: 500px;
            margin: 0 auto 2.5rem auto;
            width: 100%;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        .control-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-content);
            margin-left: 0.25rem;
        }

        /* Custom Dropdown Component */
        .custom-dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-trigger {
            width: 100%;
            padding: 0.85rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            background-color: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            outline: none;
            box-shadow: 4px 4px 8px var(--shadow-color), -4px -4px 8px var(--light-highlight);
        }

        .dropdown-trigger:hover,
        .dropdown-trigger:focus {
            border-color: #3182ce;
            box-shadow: 6px 6px 12px var(--shadow-color), -6px -6px 12px var(--light-highlight);
        }

        .dropdown-arrow {
            font-size: 0.85rem;
            color: var(--text-content);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        .custom-dropdown.active .dropdown-arrow {
            transform: rotate(180deg);
            color: #3182ce;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: var(--primary-color);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            padding: 1.25rem;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-dropdown.active .dropdown-menu {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* Circular Grid for options */
        .dropdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            justify-items: center;
            align-items: center;
            width: 100%;
        }

        .grid-cell {
            width: 100%;
            max-width: 75px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            cursor: pointer;
            background-color: var(--secondary-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            text-align: center;
            user-select: none;
            box-shadow: 4px 4px 8px var(--shadow-color), -4px -4px 8px var(--light-highlight);
        }

        @media (max-width: 480px) {
            .dropdown-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.85rem;
            }
            .grid-cell {
                font-size: 0.85rem;
            }
        }

        .grid-cell:hover {
            transform: translateY(-3px);
            border-color: #3182ce;
            box-shadow: 6px 6px 12px var(--shadow-color), -6px -6px 12px var(--light-highlight);
            color: #3182ce;
        }

        .grid-cell.active {
            background-color: #3182ce;
            color: white;
            border-color: #63b3ed;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.3), inset -4px -4px 8px rgba(255, 255, 255, 0.15);
            transform: translateY(0);
        }

        /* Department Info Button layout */
        .info-btn-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 0.25rem 0;
        }

        .info-btn-wrapper .drive-btn {
            margin-top: 0;
            width: 100%;
            text-align: center;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(49, 130, 206, 0.15);
        }

        /* Dynamic Content Container */
        .semester-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .semester-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .drive-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2d3748;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 1rem;
            transition: transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .drive-btn:hover {
            transform: translateY(-2px);
            background: #4a5568;
        }

        .info-btn {
            background: #3182ce;
        }

        .info-btn:hover {
            background: #2b6cb0;
        }

        .syllabus-img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            margin: 20px auto;
            display: block;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Reuse Grid code */
        .course-card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
            padding: 1rem;
            /* Add padding to container */
        }

        .course-button {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--secondary-color);
            color: var(--text-color);
            padding: 1.5rem;
            /* Reduced slightly */
            border-radius: 1rem;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 140px;
        }

        .course-button:hover {
            background-color: #4a5568;
            color: white !important;
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }

        .course-button:hover .course-code {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .others-btn {
            /* Special style from S04 */
            display: block;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fbbf24;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .others-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fbbf24;
        }

        .course-code {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-top: 5px;
            display: block;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .dept-container {
                /* Uniform padding for mobile */
                padding: 100px 1rem 2rem 1rem;
            }

            .semester-title {
                font-size: 1.8rem;
            }

            #dept-title {
                font-size: 2rem;
            }

            .course-card-container {
                grid-template-columns: repeat(2, 1fr);
                /* Ensure 2 cols */
                gap: 0.8rem;
                padding: 0;
            }

            .course-button {
                padding: 1rem;
                min-height: 110px;
            }

            .course-button i {
                font-size: 1.5rem !important;
                /* Force smaller icon */
            }

            /* Mobile Home Button */
            .mobile-home-btn {
                display: flex !important;
                /* Show on mobile */
            }
        }

        @media (min-width: 769px) {
            .mobile-home-btn {
                display: none !important;
                /* Hide on desktop */
            }
        }

        .mobile-home-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: var(--secondary-color);
            color: var(--text-color);
            border-radius: 50%;
            display: none;
            /* Hidden by default (desktop) */
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            z-index: 3000;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .mobile-home-btn:hover {
            background-color: var(--accent-color);
            color: white;
            transform: scale(1.1);
        }

        @media (max-width: 400px) {

            /* Very small screens */
            .course-card-container {
                grid-template-columns: 1fr;
                /* 1 col if very small */
            }
        }
    </style>
</head>

<body>

    <button id="menu-toggle" class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Reuse existing Nav -->
    <nav id="sticky-nav" class="sticky-nav visible"> <!-- Always visible here -->
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#Departments">Departments</a></li>
            <li><a href="index.html#Qbank">Q-Bank</a></li>
            <li><a href="index.html#Library">Library</a></li>
        </ul>
    </nav>

    <div id="overlay" class="overlay"></div>

    <main class="dept-container">

        <header style="text-align: center; margin-bottom: 3rem;">
            <h1 id="dept-title">Departments</h1>
            <p style="color: var(--text-content);">Explore resource materials by department</p>
        </header>

        <!-- Selection Controls -->
        <div class="controls-container">
            <!-- Department Dropdown Selection -->
            <div class="control-group">
                <label class="control-label">Select Department</label>
                <div class="custom-dropdown" id="dept-dropdown">
                    <div class="dropdown-trigger" tabindex="0">
                        <span class="selected-text" id="dept-selected-text">Select Department</span>
                        <i class="fas fa-chevron-down dropdown-arrow"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-grid" id="dept-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Departmental Info Button -->
            <div id="dept-info-wrapper" class="info-btn-wrapper" style="display: none;">
                <!-- Populated by JS -->
            </div>

            <!-- Semester Dropdown Selection -->
            <div class="control-group" id="semester-select-group" style="display: none;">
                <label class="control-label">Select Semester</label>
                <div class="custom-dropdown" id="semester-dropdown">
                    <div class="dropdown-trigger" tabindex="0">
                        <span class="selected-text" id="semester-selected-text">Select Semester</span>
                        <i class="fas fa-chevron-down dropdown-arrow"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-grid" id="semester-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. Dynamic Content -->
        <div id="semester-content">
            <!-- Content loads here -->
            <p style="text-align: center; margin-top: 50px;">Loading resources...</p>
        </div>

    </main>

    <footer class="site-footer">
        <div class="footer-credits">
            <p class="credits-text"><strong>b1t Academics</strong></p>
            <p class="copyright-text">&copy; <span id="year"></span> &nbsp;b1tranger.</p>
        </div>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <!-- Load Data and Logic -->
    <!-- Theme Switcher -->
    <button id="theme-toggle" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Mobile Home Button -->
    <a href="index.html" class="mobile-home-btn" aria-label="Go to Home">
        <i class="fas fa-home"></i>
    </a>

    <script src="js/departments-data.js"></script>
    <script src="js/departments.js"></script>
    <script src="js/theme.js"></script>

</body>

</html>
